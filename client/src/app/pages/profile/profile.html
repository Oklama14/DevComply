<div class="profile-container" *ngIf="!isLoading(); else loadingTpl">
  <!-- Header -->
  <div class="profile-header">
    <nav class="breadcrumb">
      <a routerLink="/dashboard">Home</a>
      <span>›</span>
      <span>Perfil</span>
    </nav>

    <div class="title-row">
      <h1>Meu Perfil</h1>
    </div>
  </div>

  <!-- Mensagens de feedback -->
  <div *ngIf="msg()" class="success-message">{{ msg() }}</div>
  <div *ngIf="err()" class="error-message">{{ err() }}</div>

  <!-- Informações -->
  <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
    <div class="profile-section">
      <div class="section-header">
        <h2>Informações</h2>
        <p>Atualize os dados da sua conta.</p>
      </div>

      <div class="form-group">
        <label for="nome">Nome</label>
        <input id="nome" type="text" formControlName="nome" class="form-control" />
        <small class="form-hint error-hint"
               *ngIf="profileForm.get('nome')?.invalid && profileForm.get('nome')?.touched">
          Nome é obrigatório.
        </small>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" class="form-control" />
        <small class="form-hint">O email não pode ser alterado.</small>
      </div>

      <div class="form-group">
        <label for="perfil">Perfil (Ocupação)</label>
        <input id="perfil" type="text" formControlName="perfil" class="form-control"
               placeholder="Ex: Professor(a), Engenheiro(a)..." />
      </div>

      <div class="profile-actions">
        <button type="submit" class="btn btn-primary" [disabled]="isSaving() || profileForm.invalid">
          <span *ngIf="isSaving()">Salvando...</span>
          <span *ngIf="!isSaving()">Salvar alterações</span>
        </button>
      </div>
    </div>
  </form>

  <!-- Alterar senha -->
  <form [formGroup]="passwordForm" (ngSubmit)="requestPasswordChange()">
    <div class="profile-section">
      <div class="section-header">
        <h2>Alterar Senha</h2>
        <p>Use uma senha forte, com no mínimo 8 caracteres.</p>
      </div>

      <div class="form-group">
        <label for="currentPassword">Senha atual</label>
        <input id="currentPassword" type="password" formControlName="currentPassword" class="form-control" />
      </div>

      <div class="form-group">
        <label for="newPassword">Nova senha</label>
        <input id="newPassword" type="password" formControlName="newPassword" class="form-control" />
        <small class="form-hint">Mínimo de 8 caracteres.</small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar nova senha</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" class="form-control" />
      </div>

      <div class="profile-actions">
        <button type="submit" class="btn btn-secondary" [disabled]="passwordForm.invalid">
          Atualizar senha
        </button>
      </div>
    </div>
  </form>
</div>

<ng-template #loadingTpl>
  <div class="loading">Carregando…</div>
</ng-template>
